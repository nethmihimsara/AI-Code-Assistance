<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Assistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwindConfig = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#0f172a',
                        'dark-card': '#1e293b',
                        'dark-input': '#334155',
                        'accent': '#3b82f6',
                        'accent-dark': '#1e40af',
                    },
                    animation: {
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-in': 'slideIn 0.3s ease-out',
                        'fade-in': 'fadeIn 0.3s ease-out',
                    },
                    keyframes: {
                        slideIn: {
                            'from': { transform: 'translateX(-10px)', opacity: '0' },
                            'to': { transform: 'translateX(0)', opacity: '1' },
                        },
                        fadeIn: {
                            'from': { opacity: '0' },
                            'to': { opacity: '1' },
                        },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark bg-dark-bg text-gray-100 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="sticky top-0 z-50 border-b border-gray-700 bg-dark-bg/95 backdrop-blur-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM15.657 14.243a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM11 17a1 1 0 102 0v-1a1 1 0 10-2 0v1zM5.757 15.657a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM2 10a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.757 5.757a1 1 0 000-1.414L5.05 3.636a1 1 0 00-1.414 1.414l.707.707z"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                                Code Genius
                            </h1>
                            <p class="text-xs text-gray-400">AI-Powered Code Assistance</p>
                        </div>
                    </div>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-dark-input transition-colors">
                        <svg id="themeIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Input Section -->
                <div class="lg:col-span-1 space-y-4">
                    <div class="bg-dark-card border border-gray-700 rounded-xl p-6 shadow-lg hover:shadow-xl transition-shadow">
                        <h2 class="text-lg font-semibold mb-4 flex items-center space-x-2">
                            <svg class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"></path>
                            </svg>
                            <span>Configuration</span>
                        </h2>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">
                                    API Key
                                </label>
                                <input 
                                    type="password" 
                                    id="apiKey" 
                                    placeholder="Enter your OpenRouter API key..."
                                    class="w-full px-4 py-2 bg-dark-input border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                                >
                                <p class="text-xs text-gray-400 mt-2">Get it from <a href="https://openrouter.ai" target="_blank" class="text-blue-400 hover:text-blue-300">openrouter.ai</a></p>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">
                                    Model
                                </label>
                                <div class="px-4 py-2 bg-dark-input border border-gray-600 rounded-lg text-gray-300 text-sm">
                                    stepfun/step-3.5-flash:free
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">
                                    Temperature
                                </label>
                                <div class="flex items-center space-x-3">
                                    <input 
                                        type="range" 
                                        id="temperature" 
                                        min="0" 
                                        max="2" 
                                        step="0.1" 
                                        value="0.7"
                                        class="flex-1 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                    >
                                    <span id="tempValue" class="text-sm font-medium text-gray-300 w-10 text-right">0.7</span>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">
                                    Max Tokens
                                </label>
                                <input 
                                    type="number" 
                                    id="maxTokens" 
                                    placeholder="2000"
                                    value="2000"
                                    class="w-full px-4 py-2 bg-dark-input border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
                                >
                            </div>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="bg-dark-card border border-gray-700 rounded-xl p-6">
                        <h3 class="text-sm font-semibold mb-3 text-gray-300">Quick Prompts</h3>
                        <div class="space-y-2">
                            <button onclick="setPrompt('Explain this code')" class="w-full text-left px-3 py-2 rounded-lg bg-dark-input hover:bg-accent/20 text-gray-300 hover:text-white transition-all text-sm">
                                📝 Explain Code
                            </button>
                            <button onclick="setPrompt('Find bugs in this code')" class="w-full text-left px-3 py-2 rounded-lg bg-dark-input hover:bg-accent/20 text-gray-300 hover:text-white transition-all text-sm">
                                🐛 Find Bugs
                            </button>
                            <button onclick="setPrompt('Optimize this code')" class="w-full text-left px-3 py-2 rounded-lg bg-dark-input hover:bg-accent/20 text-gray-300 hover:text-white transition-all text-sm">
                                ⚡ Optimize
                            </button>
                            <button onclick="setPrompt('Add comments to this code')" class="w-full text-left px-3 py-2 rounded-lg bg-dark-input hover:bg-accent/20 text-gray-300 hover:text-white transition-all text-sm">
                                💬 Add Comments
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Code Editor & Chat Section -->
                <div class="lg:col-span-2 space-y-4">
                    <!-- Code Input -->
                    <div class="bg-dark-card border border-gray-700 rounded-xl p-6 shadow-lg">
                        <h2 class="text-lg font-semibold mb-4 flex items-center space-x-2">
                            <svg class="w-5 h-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M5.5 13a3.5 3.5 0 01-.369-6.98 4 4 0 117.753-1.3A4.5 4.5 0 1113.5 13H11V9.413l1.293 1.293a1 1 0 001.414-1.414l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13H5.5z"></path>
                            </svg>
                            <span>Your Code</span>
                        </h2>
                        <textarea 
                            id="codeInput" 
                            placeholder="Paste your code here..."
                            class="w-full h-48 px-4 py-3 bg-dark-input border border-gray-600 rounded-lg text-white font-mono text-sm placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all resize-none"
                        ></textarea>
                    </div>

                    <!-- Prompt Input -->
                    <div class="bg-dark-card border border-gray-700 rounded-xl p-6 shadow-lg">
                        <h2 class="text-lg font-semibold mb-4 flex items-center space-x-2">
                            <svg class="w-5 h-5 text-purple-400" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5z"></path>
                            </svg>
                            <span>Your Prompt</span>
                        </h2>
                        <div class="flex gap-2">
                            <textarea 
                                id="promptInput" 
                                placeholder="What would you like me to help with?..."
                                class="flex-1 h-20 px-4 py-3 bg-dark-input border border-gray-600 rounded-lg text-white font-sans text-sm placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all resize-none"
                            ></textarea>
                            <button 
                                id="sendBtn"
                                onclick="sendMessage()"
                                class="self-end px-6 py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold rounded-lg transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center space-x-2"
                            >
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5.951-2.975 5.951 2.975a1 1 0 001.169-1.409l-7-14z"></path>
                                </svg>
                                <span>Send</span>
                            </button>
                        </div>
                    </div>

                    <!-- Response Section -->
                    <div class="bg-dark-card border border-gray-700 rounded-xl p-6 shadow-lg max-h-96 overflow-y-auto">
                        <h2 class="text-lg font-semibold mb-4 flex items-center space-x-2">
                            <svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
                            </svg>
                            <span>AI Response</span>
                        </h2>
                        <div id="responseContainer" class="space-y-3">
                            <div class="text-gray-400 text-center py-8">
                                Send a prompt to get started...
                            </div>
                        </div>
                        <div id="loadingIndicator" class="hidden">
                            <div class="flex items-center space-x-2">
                                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse" style="animation-delay: 0.2s;"></div>
                                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse" style="animation-delay: 0.4s;"></div>
                            </div>
                            <p class="text-gray-400 text-sm mt-2">AI is thinking...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="border-t border-gray-700 bg-dark-bg/50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                <div class="flex items-center justify-between text-sm text-gray-400">
                    <div>
                        <p>AI Code Assistance v1.0 | Powered by <span class="text-blue-400">OpenRouter</span></p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="https://openrouter.ai" target="_blank" class="hover:text-white transition-colors">OpenRouter</a>
                        <a href="#" class="hover:text-white transition-colors">Docs</a>
                        <a href="#" class="hover:text-white transition-colors">GitHub</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
